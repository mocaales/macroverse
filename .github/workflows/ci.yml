name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI environment
        env:
          POSTGRES_HOST: ${{ secrets.CI_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.CI_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ secrets.CI_POSTGRES_PORT }}
        run: |
          umask 077
          for variable in POSTGRES_HOST POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD POSTGRES_PORT; do
            if [[ -z "${!variable}" ]]; then
              echo "Required CI database secret is missing: ${variable}"
              exit 1
            fi
          done
          {
            printf 'POSTGRES_HOST=%s\n' "$POSTGRES_HOST"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_PORT=%s\n' "$POSTGRES_PORT"
          } > .env.ci
          cp .env.ci backend/.env
      - name: Start CI TimescaleDB
        run: docker compose --env-file .env.ci up -d --wait timescaledb
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Test
        working-directory: backend
        run: pytest
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
      - name: Apply TimescaleDB migrations
        working-directory: backend
        run: python -m app.cli migrate
      - name: Remove CI environment
        if: ${{ always() }}
        run: rm -f .env.ci backend/.env

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test with coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 7
      - name: Build
        working-directory: frontend
        run: npm run build

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: macroverse-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: macroverse-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  sonar:
    name: SonarQube analysis
    if: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_HOST_URL != '' }}
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Configure Sonar project
        env:
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          echo "sonar.projectKey=${SONAR_PROJECT_KEY}" >> sonar-project.properties
          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            echo "sonar.organization=${SONAR_ORGANIZATION}" >> sonar-project.properties
          fi
      - name: Analyze
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: -Dsonar.qualitygate.wait=true
