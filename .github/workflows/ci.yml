name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_DB: macroverse
          POSTGRES_USER: macroverse
          POSTGRES_PASSWORD: macroverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U macroverse -d macroverse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Test
        working-directory: backend
        run: pytest
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
      - name: Apply TimescaleDB migrations
        working-directory: backend
        env:
          MARKET_DATABASE_URL: postgresql://macroverse:macroverse@localhost:5432/macroverse
        run: python -m app.cli migrate

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test with coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 7
      - name: Build
        working-directory: frontend
        run: npm run build

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: macroverse-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: macroverse-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  sonar:
    name: SonarQube analysis
    if: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_HOST_URL != '' }}
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Configure Sonar project
        env:
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          echo "sonar.projectKey=${SONAR_PROJECT_KEY}" >> sonar-project.properties
          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            echo "sonar.organization=${SONAR_ORGANIZATION}" >> sonar-project.properties
          fi
      - name: Analyze
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: -Dsonar.qualitygate.wait=true
