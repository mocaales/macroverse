name: Market data sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: market-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: pip install .
      - name: Apply market database migrations
        working-directory: backend
        env:
          MARKET_DATABASE_URL: ${{ secrets.MARKET_DATABASE_URL }}
        run: python -m app.cli migrate
      - name: Synchronize market data
        working-directory: backend
        env:
          MARKET_DATABASE_URL: ${{ secrets.MARKET_DATABASE_URL }}
          MARKET_DATABASE_BATCH_SIZE: ${{ vars.MARKET_DATABASE_BATCH_SIZE || '25' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CRYPTOQUANT_ACCESS_TOKEN: ${{ secrets.CRYPTOQUANT_ACCESS_TOKEN }}
          CRYPTOQUANT_SERIES_JSON: ${{ secrets.CRYPTOQUANT_SERIES_JSON }}
        run: python -m app.cli sync-all
