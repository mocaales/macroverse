name: Market data sync

permissions:
  contents: read

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      full_backfill:
        description: Load complete provider history instead of the recent update window
        required: false
        type: boolean
        default: false

concurrency:
  group: market-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: pip install .
      - name: Create market sync environment
        env:
          MARKET_DATABASE_URL: ${{ secrets.MARKET_DATABASE_URL }}
          MARKET_DATABASE_BATCH_SIZE: ${{ vars.MARKET_DATABASE_BATCH_SIZE || '25' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CRYPTOQUANT_ACCESS_TOKEN: ${{ secrets.CRYPTOQUANT_ACCESS_TOKEN }}
          CRYPTOQUANT_SERIES_JSON: ${{ secrets.CRYPTOQUANT_SERIES_JSON }}
        run: |
          umask 077
          {
            printf 'MARKET_DATABASE_URL=%s\n' "$MARKET_DATABASE_URL"
            printf 'MARKET_DATABASE_BATCH_SIZE=%s\n' "$MARKET_DATABASE_BATCH_SIZE"
            printf 'FRED_API_KEY=%s\n' "$FRED_API_KEY"
            printf 'CRYPTOQUANT_ACCESS_TOKEN=%s\n' "$CRYPTOQUANT_ACCESS_TOKEN"
            printf 'CRYPTOQUANT_SERIES_JSON=%s\n' "$CRYPTOQUANT_SERIES_JSON"
          } > backend/.env
      - name: Apply market database migrations
        working-directory: backend
        run: python -m app.cli migrate
      - name: Synchronize market data
        working-directory: backend
        run: |
          if [[ "${{ inputs.full_backfill }}" == "true" ]]; then
            python -m app.cli sync-all --full
          else
            python -m app.cli sync-all
          fi
      - name: Remove market sync environment
        if: ${{ always() }}
        run: rm -f backend/.env
