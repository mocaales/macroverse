sonar.projectName=Macroverse
sonar.sourceEncoding=UTF-8

sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=backend/tests/**/*.py,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx
sonar.exclusions=backend/legacy_streamlit/**,frontend/src/**/*.d.ts
sonar.coverage.exclusions=backend/app/main.py,backend/app/worker.py,frontend/src/main.tsx,frontend/src/firebase.ts,frontend/src/components/FinancialYtdPlot.tsx,frontend/src/components/Plot.tsx,frontend/src/test/**

sonar.python.version=3.13
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPaths=frontend/tsconfig.app.json
